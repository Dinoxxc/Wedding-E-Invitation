<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP | Dika & Sasa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  
  <!-- Dark Mode Toggle -->
  <button id="dark-mode-toggle" class="dark-mode-toggle">🌙</button>
  
  <!-- Back Button -->
  <a href="/" class="btn-back">←</a>

  <section>
    <div class="container container-sm">
      <div class="section-header">
        <div class="section-subtitle">RESERVE YOUR SEAT</div>
        <h1 class="section-title">RSVP</h1>
        <p class="section-description">
          Please let us know if you can join us in celebrating our special day
        </p>
      </div>

      <form class="form" action="/api/rsvp" method="POST">
        
        <div class="form-group">
          <label class="form-label" for="name">Full Name *</label>
          <input type="text" id="name" name="name" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address *</label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Will you attend? *</label>
          <div class="form-radio-group">
            <label class="form-radio">
              <input type="radio" name="attendance" value="yes" required>
              <span>Yes, I'll be there</span>
            </label>
            <label class="form-radio">
              <input type="radio" name="attendance" value="no" required>
              <span>Sorry, I can't make it</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="guests">Number of Guests</label>
          <select id="guests" name="guests" class="form-select">
            <option value="1">1 Guest</option>
            <option value="2">2 Guests</option>
            <option value="3">3 Guests</option>
            <option value="4">4 Guests</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Special Requests or Dietary Restrictions</label>
          <textarea id="message" name="message" class="form-textarea" placeholder="Let us know if you have any special requirements..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary form-submit">Submit RSVP</button>

      </form>
    </div>
  </section>

  <script src="/js/main.js"></script>

</body>
</html>
