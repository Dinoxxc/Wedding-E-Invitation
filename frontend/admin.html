<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .stat-card {
      background: var(--color-light);
      border: 1px solid var(--color-border);
      padding: 2rem;
      text-align: center;
    }
    .stat-number {
      font-family: var(--font-primary);
      font-size: 3rem;
      font-weight: 500;
      color: var(--color-primary);
    }
    .stat-label {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-muted);
      margin-top: 0.5rem;
    }
    .admin-section {
      background: var(--color-light);
      border: 1px solid var(--color-border);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .admin-section h2 {
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .admin-table th {
      text-align: left;
      padding: 1rem;
      background: var(--color-bg-light);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.75rem;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table tr:hover {
      background: var(--color-bg-lighter);
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-success {
      background: var(--color-primary);
      color: var(--color-light);
    }
    .badge-danger {
      background: #d32f2f;
      color: white;
    }
    .badge-warning {
      background: #f57c00;
      color: white;
    }
    .btn-delete {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      background: transparent;
      border: 1px solid #d32f2f;
      color: #d32f2f;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .btn-delete:hover {
      background: #d32f2f;
      color: white;
    }
    .btn-approve {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      background: transparent;
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 0.5rem;
    }
    .btn-approve:hover {
      background: var(--color-primary);
      color: white;
    }
    .login-box {
      max-width: 400px;
      margin: 5rem auto;
      padding: 3rem;
      background: var(--color-light);
      border: 1px solid var(--color-border);
    }
    @media (max-width: 768px) {
      .admin-table {
        font-size: 0.75rem;
      }
      .admin-table th,
      .admin-table td {
        padding: 0.5rem;
      }
      .stat-number {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body class="with-sidebar">
  
  <!-- Floating Couple Photos -->
  <div class="floating-photos-container">
    <div class="floating-photo" style="top: 10%; left: 5%;">
      <img src="/images/couple1.jpg" alt="Couple photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22%3E%3Crect width=%22120%22 height=%22120%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2214%22 fill=%22%23999%22%3ED%26S%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="floating-photo" style="top: 30%; right: 8%;">
      <img src="/images/couple2.jpg" alt="Couple photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22%3E%3Crect width=%22120%22 height=%22120%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2214%22 fill=%22%23999%22%3ED%26S%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="floating-photo" style="bottom: 20%; left: 10%;">
      <img src="/images/couple3.jpg" alt="Couple photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22%3E%3Crect width=%22120%22 height=%22120%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2214%22 fill=%22%23999%22%3ED%26S%3C/text%3E%3C/svg%3E'">
    </div>
    <div class="floating-photo" style="top: 50%; right: 15%;">
      <img src="/images/couple4.jpg" alt="Couple photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22%3E%3Crect width=%22120%22 height=%22120%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2214%22 fill=%22%23999%22%3ED%26S%3C/text%3E%3C/svg%3E'">
    </div>
  </div>
  
  <!-- Dark Mode Toggle -->
  <button id="dark-mode-toggle" class="dark-mode-toggle" title="Toggle Dark Mode">
    <svg class="moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 10.5C16 14.5 12.5 17 8.5 17C4.5 17 1 13.5 1 9.5C1 5.5 3.5 2 7.5 1C6.5 2 6 3.5 6 5C6 8.5 8.5 11 12 11C13.5 11 15 10.5 16 9.5C16.5 9.8 16.8 10.1 17 10.5Z" fill="currentColor"/>
    </svg>
    <svg class="sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
      <circle cx="10" cy="10" r="4" fill="currentColor"/>
      <path d="M10 1V3M10 17V19M19 10H17M3 10H1M16.364 3.636L14.95 5.05M5.05 14.95L3.636 16.364M16.364 16.364L14.95 14.95M5.05 5.05L3.636 3.636" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  
  <!-- Translate Button -->
  <button id="translate-toggle" class="translate-toggle" title="Translate">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 2C5.5 2 2 5.5 2 10C2 14.5 5.5 18 10 18C14.5 18 18 14.5 18 10C18 5.5 14.5 2 10 2Z" stroke="currentColor" stroke-width="1.5"/>
      <path d="M2 10H18M10 2C12 4 13 7 13 10C13 13 12 16 10 18M10 2C8 4 7 7 7 10C7 13 8 16 10 18" stroke="currentColor" stroke-width="1.5"/>
      <text x="10" y="13.5" text-anchor="middle" font-size="8" font-weight="bold" fill="currentColor">A</text>
    </svg>
  </button>
  
  <!-- Language Selector Dropdown -->
  <div id="language-dropdown" class="language-dropdown" style="display: none;">
    <button class="lang-option" data-lang="en">English</button>
    <button class="lang-option" data-lang="id">Indonesian</button>
    <button class="lang-option" data-lang="jv">Javanese</button>
    <button class="lang-option" data-lang="su">Sundanese</button>
  </div>
  
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">D & S</div>
    <ul class="sidebar-nav">
      <li><a href="/" class="nav-link">Home</a></li>
      <li><a href="/story" class="nav-link">Story</a></li>
      <li><a href="/gallery" class="nav-link">Gallery</a></li>
      <li><a href="/details" class="nav-link">Details</a></li>
      <li><a href="/rsvp" class="nav-link">RSVP</a></li>
      <li><a href="/messages" class="nav-link">Messages</a></li>
      <li><a href="/registry" class="nav-link">Registry</a></li>
      <li><a href="/admin" class="nav-link active">Admin</a></li>
    </ul>
  </aside>
  
  <!-- Login Section -->
  <div id="login-section" style="display: none;">
    <div class="login-box">
      <div class="text-center mb-lg">
        <h2>Admin Login</h2>
        <div class="hero-divider"></div>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            required
          >
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            required
          >
        </div>
        <div class="text-center mt-lg">
          <button type="submit" class="btn btn-primary btn-lg">Login</button>
        </div>
      </form>
      <div class="text-center mt-md">
        <a href="/" style="font-size: 0.875rem; color: var(--color-muted);">← Back to Website</a>
      </div>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-dashboard" style="display: none;">
    <div class="admin-container">
      
      <div class="admin-header">
        <div>
          <h1>Admin Dashboard</h1>
          <p style="color: var(--color-muted); font-size: 0.875rem;">Wedding E-Invitation Management</p>
        </div>
        <div>
          <a href="/" class="btn" style="margin-right: 1rem;">View Website</a>
          <button onclick="logout()" class="btn">Logout</button>
        </div>
      </div>

      <!-- Stats -->
      <div id="rsvp-stats" class="stat-grid">
        <div class="stat-card">
          <div class="stat-number">-</div>
          <div class="stat-label">Loading...</div>
        </div>
      </div>

      <!-- RSVPs Section -->
      <div class="admin-section">
        <h2>RSVP Responses</h2>
        <div id="rsvp-list">
          <p style="text-align: center; color: var(--color-muted); padding: 2rem;">Loading RSVPs...</p>
        </div>
      </div>

      <!-- Messages Section -->
      <div class="admin-section">
        <h2>Guest Messages</h2>
        <div id="messages-admin-list">
          <p style="text-align: center; color: var(--color-muted); padding: 2rem;">Loading messages...</p>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
  
  <!-- Google Translate API -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      console.log('🌐 Google Translate initializing...');
      try {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,id,jv,su',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
        console.log('✅ Google Translate initialized successfully');
      } catch (error) {
        console.error('❌ Google Translate initialization failed:', error);
      }
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  
  <!-- Hidden Google Translate Container -->
  <div id="google_translate_element" style="display: none;"></div>

</body>
</html>
